
  services:
    db:
      image: postgres:16-alpine
      container_name: vacation-postgres

      environment:
        POSTGRES_DB: vacation_db
        POSTGRES_USER: vacation_user
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      ports:
        - "5432:5432"

      volumes:
        - postgres_data:/var/lib/postgresql/data

      healthcheck:
        test:
          [
            "CMD-SHELL",
            "pg_isready -U vacation_user -d vacation_db"
          ]
        interval: 5s
        timeout: 5s
        retries: 10

      restart: unless-stopped

    api:
      build:
        context: .
        dockerfile: Dockerfile

      container_name: vacation-api

      ports:
        - "8080:8080"

      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/vacation_db
        SPRING_DATASOURCE_USERNAME: vacation_user
        SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

        JWT_SECRET: ${JWT_SECRET}
        JWT_EXPIRATION: 3600000

      depends_on:
        db:
          condition: service_healthy

      restart: unless-stopped

  volumes:
    postgres_data:

